<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contribute a PDF | PDF Shelve</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
body { background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.container { width: 100%; max-width: 600px; background: #1e293b; padding: 35px; border-radius: 15px; box-shadow: 0 0 25px rgba(0,0,0,.4); }
h1 { text-align: center; margin-bottom: 10px; }
p { text-align: center; color: #cbd5e1; margin-bottom: 30px; }
label { display: block; margin-top: 18px; margin-bottom: 8px; font-weight: bold; }
input, select { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #334155; color: white; font-size: 16px; }
input:focus, select:focus { outline: 2px solid #10b981; }
button { margin-top: 25px; width: 100%; padding: 15px; border: none; border-radius: 8px; background: #10b981; color: white; font-size: 18px; cursor: pointer; transition: .3s; font-weight: bold; }
button:hover { background: #059669; }
button:disabled { background: #64748b; cursor: not-allowed; }
footer { text-align: center; margin-top: 25px; }
a { color: #60a5fa; text-decoration: none; }
.popup-alert { position: fixed; top: 20px; right: 20px; background: #10b981; color: white; padding: 15px 25px; border-radius: 8px; display: none; font-weight: bold; z-index: 1000; }
</style>
</head>
<body>
<div id="successAlert" class="popup-alert">🚀 Submitted for Admin Review!</div>
<div class="container">
<h1>📤 Quick Contribute</h1>
<p>Submit your link directly to our review team queue.</p>
<form id="submissionForm">

    <input type="hidden" name="access_key" value="dd7e517b-6640-4436-af96-dd6b08e2048b">
    <input type="hidden" name="subject" value="🚨 Pending Review: New Item Added">
    
    <input type="hidden" name="Action_Required_Go_To_Dashboard" value="https://learning-shelve-blackparrot.blackparrotfedora.workers.dev/admin">
    
    <input type="hidden" id="emailRowId" name="Generated_Item_ID">
    <input type="hidden" id="emailStatus" name="Status_Setting" value="PENDING">

    <label>Contributor Name</label>
    <input type="text" id="contributor" name="Contributor_Profile" placeholder="Anonymous">

    <label>File Category</label>
    <select id="category" name="File_Category" required>
        <option value="books">📚 Physics Book</option>
        <option value="manuals">🧪 Lab Manual</option>
    </select>

    <label>Subject / Course</label>
    <input type="text" id="subjectField" name="Subject_Or_Course" placeholder="e.g., Physics" required>

    <label>Document Title</label>
    <input type="text" id="title" name="Document_Title" placeholder="e.g., Light Refraction Manual" required>

    <label>Public Shareable Link</label>
    <input type="url" id="link" name="Target_Link_Location" placeholder="https://drive.google.com/..." required>

    <button type="submit" id="submitBtn">🚀 Submit Contribution</button>
</form>
<footer><a href="index.html">⬅ Back to Home</a></footer>
</div>

<script>
const SHEETDB_API_URL = "https://sheetdb.io/api/v1/07ui9murzi2v8";

document.getElementById('submissionForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = "Processing...";

    // Generate clean alphanumeric ID string
    const rowId = "id_" + Math.random().toString(36).substr(2, 9);
    document.getElementById('emailRowId').value = rowId;

    const databasePayload = {
        data: [{
            id: rowId,
            Contributor: document.getElementById('contributor').value || "Anonymous",
            Category: document.getElementById('category').value,
            Subject: document.getElementById('subjectField').value,
            Title: document.getElementById('title').value,
            Link: document.getElementById('link').value,
            Status: "PENDING"
        }]
    };

    try {
        // Step A: Push tracking logs directly onto SheetDB engine storage array
        const dbResponse = await fetch(SHEETDB_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(databasePayload)
        });

        if (!dbResponse.ok) throw new Error("Database update failure");

        // Step B: Submit data to Web3Forms securely
        const response = await fetch('https://api.web3forms.com/submit', {
            method: 'POST',
            body: new FormData(this)
        });

        if (response.ok) {
            const alertBox = document.getElementById('successAlert');
            alertBox.style.display = 'block';
            this.reset();
            setTimeout(() => alertBox.style.display = 'none', 4000);
        } else {
            alert("Email routing issue occurred. Submission logged to database dashboard only.");
        }
    } catch (err) {
        console.error(err);
        alert("System connection error. Please try again.");
    } finally {
        btn.disabled = false;
        btn.textContent = "🚀 Submit Contribution";
    }
});
</script>
</body>
</html>
